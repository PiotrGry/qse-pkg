# qse-gate.toml — example config for the AI-Drift Firewall gate.
# Sprint 0 scope: Python only. Java/Go via qse-core in Sprint 0.5.

[gate]
language = "python"

# Scope graph construction to product source + tests. Without this, the scanner
# walks the whole repo (vendored Rust build output, benchmark scratch, generated
# artefacts) and a 200-module product looks like a 2500-module one — gate takes
# 68 s on this repo without the filter.
[scan]
include = [
    "qse/**/*.py",
    "qse-py/**/*.py",
    "tests/**/*.py",
    "examples/**/*.py",
]
exclude = [
    "**/__pycache__/**",
    "**/_obsolete/**",
    "**/target/**",
    "**/build/**",
    "**/dist/**",
    "**/*.egg-info/**",
    "**/artifacts/**",
    "**/results/**",
    "**/experiments/**",
    "**/papiers/**",
    "**/venv/**",
    "**/.venv/**",
    "**/.pytest_cache/**",
    "**/tests/fixtures/gate/**",
]

# Map source-tree roots to logical layers.
# Glob patterns are matched against either the dotted module or the relative file path.
[layers]
domain         = ["src/domain/**",         "domain/**"]
application    = ["src/application/**",    "application/**"]
infrastructure = ["src/infra/**",          "infra/**",          "src/infrastructure/**"]
presentation   = ["src/presentation/**",   "presentation/**",   "src/api/**"]

# CYCLE_NEW — no new strongly-connected components should appear.
# Sprint 0: mode = "any" flags all cycles (no base graph). mode = "delta"
# requires --base repo_path and flags only cycles not present in base.
[rules.cycle_new]
enabled = true
mode    = "any"

# LAYER_VIOLATION — forbid edges from `from` layer to `to` layer.
[rules.layer_violation]
enabled = true
forbidden = [
    { from = "domain",      to = "infrastructure" },
    { from = "domain",      to = "presentation"   },
    { from = "application", to = "presentation"   },
]

# BOUNDARY_LEAK — protected modules may only be imported from allowed_callers.
[rules.boundary_leak]
enabled = true
protected = [
    # { module = "src.payments.core.*", allowed_callers = ["src.payments.api.*"] },
]

[telemetry]
jsonl_path  = "artifacts/gate-telemetry.jsonl"
webhook_url = ""
