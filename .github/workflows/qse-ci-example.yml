name: qse-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Example 1: Python project (auto-scan)
  agq-python:
    uses: PiotrGry/qse-pkg/.github/workflows/qse-gate.yml@main
    with:
      path: "src/"
      threshold: 0.70
      ratchet: true

